name: Release Desktop App
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string
env:
  NODE_ENV: production
  # for web platform only, but required by the frontend code, so we set it to an empty string
  PUBLIC_ADSENSE_PUBLISHER_ID: "" # not needed for desktop app, but required by the frontend code, so we set it to an empty string
  PUBLIC_GOOGLE_ANALYTICS_ID: ""  # not needed for desktop app, but required by the frontend code, so we set it to an empty string
jobs:
  # Windows build and release using Tauri's GitHub Action. This is separate to ensure we can sign the Windows executable properly.
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      #  Bun
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
            src-tauri/target
          key: ${{ runner.os }}-tauri-${{ hashFiles('**/bun.lockb') }}
      - name: Install dependencies (Frontend)
        run: bun install
      - name: Build and Release (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Orbit PDF - Windows Release ${{ github.ref_name }}"
          releaseBody: "See assets below to download and install."
          releaseDraft: true
          prerelease: false
  
  # Linux build and release using Tauri's GitHub Action. This is separate to ensure we can build the Linux AppImage properly.
  build-linux:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      #  Bun
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
            src-tauri/target
          key: ${{ runner.os }}-tauri-${{ hashFiles('**/bun.lockb') }}
      - name: Install dependencies (Frontend)
        run: bun install
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev
      - name: Build and Release (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Orbit PDF - Linux Release ${{ github.ref_name }}"
          releaseBody: "See assets below to download and install."
          releaseDraft: true
          prerelease: false

    