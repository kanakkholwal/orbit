<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" href="/assets/meta/favicon.ico" />
	<link rel="manifest" href="/manifest.json" />
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div id="boot">
		<div class="boot-wrap">
			<div style="position:relative">
				<img src="/assets/meta/logo.svg" height="72" class="boot-logo" />
			</div>

			<div style="display:flex;flex-direction:column;align-items:center;gap:12px">
				<div class="loader"></div>
				<div class="boot-text">The professional PDF toolkit</div>
			</div>
		</div>
		<style>
			:root {
				color-scheme: light dark;
				--boot-logo-filter: none;
				/* light defaults */
				--boot-bg: linear-gradient(hsl(40 30% 96%), hsl(40 30% 96%));
				--boot-fg: hsl(222 47% 11%);
				--boot-muted: hsl(215 16% 47%);
				--boot-track: hsl(220 14% 90%);
				--boot-primary: hsl(175, 84%, 32%);
			}



			/* if your app uses .dark on <html> this wins over media query */
			html.dark {
				--boot-bg: linear-gradient(#393737, #1b1b1b);
				--boot-fg: hsl(210 40% 98%);
				--boot-muted: hsl(215 20% 65%);
				--boot-track: hsl(217 33% 17%);
				--boot-logo-filter: invert(1) hue-rotate(180deg);
			}

			html,
			body {
				margin: 0;
				height: 100%;
				background: var(--boot-bg);
				color: var(--boot-fg);
				display: flex;
				align-items: center;
				justify-content: center;
				font-family: "Google Sans", "Inter", system-ui, sans-serif;
			}

			.boot-wrap {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 48px;
			}

			/* logo adapts automatically */
			.boot-logo {
				height: 72px;
				color: var(--boot-fg);
				filter: var(--boot-logo-filter);
			}

			/* loader track */
			.loader {
				position: relative;
				height: 2px;
				width: 192px;
				overflow: hidden;
				border-radius: 999px;
				background: var(--boot-track);
			}

			/* animated gradient */
			.loader::before {
				content: "";
				position: absolute;
				inset: 0;
				background: linear-gradient(90deg,
						transparent,
						var(--boot-primary),
						transparent);
				animation: slide 1.2s ease-in-out infinite;
				opacity: 0.9;
			}

			@keyframes slide {
				from {
					transform: translateX(-100%);
				}

				to {
					transform: translateX(100%);
				}
			}

			.boot-text {
				font-size: 10px;
				letter-spacing: 0.2em;
				text-transform: uppercase;
				color: var(--boot-muted);
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
				animation: pulseText 2s ease-in-out infinite;
			}

			@keyframes pulseText {

				0%,
				100% {
					opacity: 0.45;
				}

				50% {
					opacity: 1;
				}
			}
		</style>
	</div>

	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
